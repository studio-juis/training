        }
      }

* { box-sizing: border-box; margin: 0; padding: 0; }

body { font-family: 'Barlow', sans-serif; background: var(--white); color: var(--black); }

.logo svg { height: 22px; width: auto; }
.nav-links { display: flex; gap: 28px; align-items: center; flex-shrink: 0; }
.nav-links a { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .1em; color: rgba(255,255,255,.8); text-decoration: none; }
.nav-links a:hover { color: #fff; }
.nav-links a.active { color: #fff; border-bottom: 2px solid rgba(255,255,255,.5); padding-bottom: 2px; }

/* ── PAGE HEADER ── */
.page-header {
  background: var(--coral);
  padding: 100px 40px 64px;
}
.page-header-label {
  font-size: 11px; font-weight: 600; letter-spacing: .2em;
  text-transform: uppercase; color: rgba(255,255,255,.75);
  margin-bottom: 12px;
}
.page-header-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800; text-transform: uppercase;
  font-size: 72px; color: var(--white);
  line-height: 0.88; letter-spacing: .02em;
}
.page-header-title em { font-style: normal; color: rgba(255,255,255,.5); }
.page-header-sub {
  margin-top: 20px;
  font-size: 16px; font-weight: 300; color: rgba(255,255,255,.85);
  max-width: 560px; line-height: 1.7;
}

/* ── FILTER BAR ── */
.filter-bar {
  background: var(--white);
  border-bottom: 1px solid var(--gray-light);
  padding: 20px 40px;
  display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
  position: sticky; top: 0; z-index: 5;
}
.filter-label {
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: .15em; color: var(--gray-mid); margin-right: 4px;
}
.filter-btn {
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: .08em; padding: 6px 14px; border-radius: 20px;

}
.filter-btn:hover { border-color: var(--coral); color: var(--coral); }
.filter-btn.active { background: var(--coral); border-color: var(--coral); color: var(--white); }



/* ── MAIN CONTENT ── */
.main { width: 100%; padding: 40px 40px 80px; }



/* ── LETTER SECTION ── */
.letter-section { margin-bottom: 48px; }
.letter-heading {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800; font-size: 56px; text-transform: uppercase;
  color: var(--gray-light); line-height: 1;
  border-bottom: 2px solid var(--gray-light);
  padding-bottom: 4px; margin-bottom: 16px;
  letter-spacing: .02em;
}

/* ── TERM GRID ── */
.term-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
}
.term-card {
  background: var(--white);
  border: 1px solid var(--gray-light);
  border-radius: 12px;
  padding: 20px 22px;
  transition: box-shadow .18s, transform .18s;
}
.term-card:hover {
  box-shadow: 0 4px 20px rgba(0,0,0,.08);
  transform: translateY(-1px);
}
.term-card.hidden { display: none; }

.term-badge {
  font-size: 9px; font-weight: 600; text-transform: uppercase;
  letter-spacing: .1em; padding: 3px 8px; border-radius: 20px;
  display: inline-block; margin-top: 12px;
}
.term-badge.kf, .term-badge.sw, .term-badge.both { background: var(--gray-light); color: var(--gray-dark); }

.term-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700; font-size: 20px; text-transform: uppercase;
  letter-spacing: .02em; color: var(--black); line-height: 1.1;
  margin-bottom: 8px;
}
.term-def {
  font-size: 14px; font-weight: 300; color: var(--gray-dark);
  line-height: 1.65;
}

/* ── EMPTY STATE ── */
.empty-state {
  display: none; text-align: center; padding: 60px 20px;
  color: var(--gray-mid); font-size: 15px; font-weight: 300;
}



/* ── FOOTER ── */
footer { background: var(--gray-light); padding: 28px 40px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }

.footer-links a:hover { color: var(--black); }
.footer-copy { font-size: 11px; color: var(--gray-mid); }

/* ── MOBILE ── */
@media (max-width: 768px) {
  nav { padding: 16px 20px; }

  footer { padding: 24px 20px; flex-direction: column; align-items: flex-start; gap: 16px; }
  .footer-links { flex-wrap: wrap; gap: 12px; }
}
</style>

<script>
// ── Term data ──────────────────────────────────────────────────────────────
const terms = [
  // A
  { letter: 'A', name: 'Adaptation', cat: 'both', def: 'Die Anpassungsreaktion des Körpers auf einen Trainingsreiz. Der Körper wird nach einer Belastung nicht nur wiederhergestellt, sondern leistungsfähiger als zuvor — die Grundlage jedes Trainingsfortschritts.', link: null },
  { letter: 'A', name: 'Atemtechnik', cat: 'sw', def: 'Beim Kraulschwimmen wird die Luft seitlich ausgeblasen, während der Kopf zum Einatmen kurz zur Seite dreht. Eine gleichmäßige Atemtechnik ist der Schlüssel zu einem entspannten Kraulrhythmus.', link: 'kraulschwimmen.html', linkText: 'Zum Kraulschwimmen' },
  { letter: 'A', name: 'Ausbelastung', cat: 'kf', def: 'Bezeichnet das Trainieren bis an die Grenze der momentanen Leistungsfähigkeit in einem Satz. Ausbelastung ist ein wichtiger Reiz für Muskelwachstum — sollte aber gezielt und nicht bei jeder Übung eingesetzt werden.', link: 'training.html', linkText: 'Zum Krafttraining' },
  // B
  { letter: 'B', name: 'Beinschlag', cat: 'sw', def: 'Der kontinuierliche auf-ab-Schlag der Beine beim Kraulschwimmen. Er stabilisiert die Körperlage im Wasser und erzeugt zusätzlichen Vortrieb — dafür muss die Bewegung jedoch aus der Hüfte kommen, nicht aus dem Knie.', link: 'kraulschwimmen.html', linkText: 'Zum Kraulschwimmen' },
  { letter: 'B', name: 'Beweglichkeit', cat: 'both', def: 'Die Fähigkeit, Gelenke in einem möglichst großen Bewegungsradius zu bewegen. Im Krafttraining sorgt gute Beweglichkeit für saubere Technik und schützt vor Verletzungen — beim Schwimmen ermöglicht sie einen weiten, effizienten Armzug.', link: null },
  // C
  { letter: 'C', name: 'Cool-down', cat: 'both', def: 'Die Abkühlphase am Ende einer Trainingseinheit. Leichte Bewegung und Dehnen helfen dem Körper, den Stoffwechsel herunterzufahren, den Herzschlag zu normalisieren und die Regeneration einzuleiten.', link: null },
  // D
  { letter: 'D', name: 'Durchhaltefähigkeit', cat: 'both', def: 'Die mentale und körperliche Fähigkeit, ein Training auch bei zunehmender Erschöpfung fortzuführen. Sie entwickelt sich mit wachsender Erfahrung und ist eng mit Motivation und Gewohnheit verknüpft.', link: null },
  { letter: 'D', name: 'Deload-Woche', cat: 'kf', def: 'Eine bewusst leichtere Trainingswoche nach mehreren intensiven Wochen. Das Volumen und die Intensität werden reduziert, damit sich der Körper erholen kann — ohne das Training vollständig zu unterbrechen.', link: 'training.html', linkText: 'Zum Krafttraining' },
  // E
  { letter: 'E', name: 'Einheit', cat: 'both', def: 'Eine einzelne Trainingseinheit bezeichnet eine abgeschlossene Trainingsession — von Warm-up bis Cool-down. Abhängig vom Ziel dauert eine Einheit typischerweise 45 bis 90 Minuten.', link: null },
  { letter: 'E', name: 'Ermüdung', cat: 'both', def: 'Vorübergehende Leistungsminderung als direkte Folge von Training. Kurzfristige Ermüdung ist normal und gewollt — chronische Ermüdung durch fehlende Regeneration hingegen bremst den Fortschritt.', link: null },
  // F
  { letter: 'F', name: 'Freihanteln', cat: 'kf', def: 'Kurz- oder Langhanteln, bei denen die Bewegung nicht durch eine Maschine geführt wird. Sie schulen die intermuskuläre Koordination und aktivieren stabilisierende Muskeln stärker als geführte Geräte.', link: 'training.html', linkText: 'Zum Krafttraining' },
  { letter: 'F', name: 'Frequenz', cat: 'both', def: 'Gibt an, wie oft eine Muskelgruppe oder eine Bewegung pro Woche trainiert wird. Eine höhere Frequenz kann die Entwicklung beschleunigen — vorausgesetzt, die Regeneration hält Schritt.', link: null },
  // G
  { letter: 'G', name: 'Gewohnheit', cat: 'both', def: 'Regelmäßiges Training wird erst dann nachhaltig, wenn es zur Gewohnheit wird — also automatisch im Alltag verankert ist. Studien zeigen, dass es im Schnitt 60 bis 90 Tage dauert, bis eine neue Trainingsroutine stabil ist.', link: null },
  { letter: 'G', name: 'Gleitlage', cat: 'sw', def: 'Die optimale, horizontale Körperposition im Wasser nach dem Abstoß oder einer kräftigen Zugphase. Eine gute Gleitlage minimiert den Wasserwiderstand und ist Grundlage eines energiesparenden Kraulstils.', link: 'kraulschwimmen.html', linkText: 'Zum Kraulschwimmen' },
  // H
  { letter: 'H', name: 'Hypertrophie', cat: 'kf', def: 'Das Wachstum der Muskelfasern als Anpassung auf Krafttraining. Hypertrophie entsteht, wenn Muskeln regelmäßig mit ausreichender Intensität und Volumen belastet werden — und anschließend gut regenerieren.', link: 'training.html', linkText: 'Zum Krafttraining' },
  // I
  { letter: 'I', name: 'Intensität', cat: 'both', def: 'Im Krafttraining beschreibt Intensität das verwendete Gewicht im Verhältnis zum Maximum (z. B. 70 % des 1RM). Im Ausdauersport steht sie für die Herzfrequenz oder Geschwindigkeit im Verhältnis zur maximalen Leistung.', link: null },
  // J
  { letter: 'J', name: 'Jahresplanung', cat: 'both', def: 'Die langfristige Strukturierung des Trainings über ein ganzes Jahr — mit Aufbauphasen, Intensivphasen und bewussten Regenerationswochen. Eine gute Jahresplanung verhindert Stagnation und beugt Überlastung vor.', link: null },
  // K
  { letter: 'K', name: 'Kabelzug', cat: 'kf', def: 'Ein Trainingsgerät mit einem verstellbaren Zugseil, das konstante Spannung während der gesamten Bewegung erzeugt. Kabelzüge eignen sich für vielseitige Übungen aus verschiedenen Winkeln.', link: 'training.html', linkText: 'Zum Krafttraining' },
  { letter: 'K', name: 'Knochendichte', cat: 'kf', def: 'Die Dichte und Festigkeit des Knochenmaterials. Ab 40 nimmt die Knochendichte natürlich ab — regelmäßiges Krafttraining gilt als eine der wirksamsten Methoden, um diesem Prozess entgegenzuwirken.', link: 'training.html', linkText: 'Zum Krafttraining' },
  { letter: 'K', name: 'Körperhaltung', cat: 'both', def: 'Die Ausrichtung von Wirbelsäule, Schultern und Becken in Ruhe und Bewegung. Gute Körperhaltung schützt die Gelenke, verbessert die Kraftübertragung und beugt Schmerzen im Rücken und Nacken vor.', link: null },
  { letter: 'K', name: 'Kraul-Armzug', cat: 'sw', def: 'Die Zugphase beim Kraulschwimmen, bei der der Arm im Wasser von vorne nach hinten zieht. Ein langer, vollständiger Armzug — weit vorne eintauchen, tief ziehen — erzeugt den meisten Vortrieb.', link: 'kraulschwimmen.html', linkText: 'Zum Kraulschwimmen' },
  // L
  { letter: 'L', name: 'Leistungsfähigkeit', cat: 'both', def: 'Das individuelle Niveau, auf dem Kraft, Ausdauer, Koordination und Beweglichkeit zusammenwirken. Leistungsfähigkeit ist kein fester Wert — sie entwickelt sich kontinuierlich mit konsequentem Training und guter Regeneration.', link: null },
  // M
  { letter: 'M', name: 'Maschinen', cat: 'kf', def: 'Geführte Trainingsgeräte, die den Bewegungsweg vorgeben. Sie sind besonders für Einsteigerinnen geeignet, da sie die korrekte Technik erleichtern und das Verletzungsrisiko reduzieren.', link: 'training.html', linkText: 'Zum Krafttraining' },
  { letter: 'M', name: 'Muskelmasse', cat: 'kf', def: 'Der Anteil an Muskeln an der Körperzusammensetzung. Ab 40 verliert der Körper ohne gezielten Reiz jährlich Muskelmasse (Sarkopenie). Krafttraining ist der wirksamste Weg, diese zu erhalten oder aufzubauen.', link: 'training.html', linkText: 'Zum Krafttraining' },
  // N
  { letter: 'N', name: 'Neuromuskuläre Koordination', cat: 'both', def: 'Das Zusammenspiel von Nervensystem und Muskeln bei der Ausführung von Bewegungen. Besonders zu Beginn des Trainings sind Kraftzuwächse vor allem auf verbesserte Koordination zurückzuführen — noch bevor Muskeln wachsen.', link: null },
  // O
  { letter: 'O', name: 'Overtraining', cat: 'both', def: 'Ein Zustand chronischer Überlastung, bei dem Trainingsreize und Erholung dauerhaft aus dem Gleichgewicht geraten. Symptome sind anhaltende Müdigkeit, Leistungsabfall und Stimmungsschwankungen. Die Lösung: gezielte Ruhephasen.', link: null },
  // P
  { letter: 'P', name: 'Pausen', cat: 'kf', def: 'Die Erholungszeit zwischen zwei Trainingssätzen. Kurze Pausen (30–60 Sek.) erhöhen den Stoffwechselreiz, lange Pausen (2–4 Min.) erlauben mehr Kraft für den nächsten Satz. Das Ziel bestimmt die optimale Pausenlänge.', link: 'training.html', linkText: 'Zum Krafttraining' },
  { letter: 'P', name: 'Progression', cat: 'both', def: 'Das systematische Steigern der Trainingsanforderung — mehr Gewicht, mehr Wiederholungen, kürzere Pausen oder bessere Technik. Ohne Progression stagniert die Entwicklung: der Körper passt sich nur an neue Reize an.', link: null },
  // Q
  { letter: 'Q', name: 'Qualität vor Quantität', cat: 'both', def: 'Ein zentrales Trainingsprinzip: saubere Technik und kontrollierte Ausführung sind wichtiger als hohes Gewicht oder viele Wiederholungen. Wer Qualität priorisiert, macht langfristig mehr Fortschritt — und verletzt sich seltener.', link: null },
  // R
  { letter: 'R', name: 'Regeneration', cat: 'both', def: 'Die Erholungsphase nach dem Training, in der der Körper sich anpasst und stärker wird. Regeneration umfasst Schlaf, Ernährung und Ruhetage — und ist genauso wichtig wie das Training selbst.', link: null },
  { letter: 'R', name: 'Rollbewegung', cat: 'sw', def: 'Die seitliche Rotation des Körpers um die Längsachse beim Kraulschwimmen. Die Rolle ermöglicht einen kraftvolleren Armzug und macht das Einatmen zur Seite einfacher und natürlicher.', link: 'kraulschwimmen.html', linkText: 'Zum Kraulschwimmen' },
  { letter: 'R', name: 'RPE-Skala', cat: 'kf', def: 'Rating of Perceived Exertion — eine Skala von 1–10, auf der Sportlerinnen die empfundene Anstrengung einschätzen. Im modernen Krafttraining wird häufig RPE 7–9 angestrebt: herausfordernd, aber mit Reserve.', link: 'training.html', linkText: 'Zum Krafttraining' },
  // S
  { letter: 'S', name: 'Sätze & Wiederholungen', cat: 'kf', def: 'Ein Satz ist eine ununterbrochene Folge von Wiederholungen einer Übung. Typische Hypertrophiebereiche liegen bei 3–5 Sätzen mit 8–15 Wiederholungen pro Übung, je nach Ziel und Trainingsstand.', link: 'training.html', linkText: 'Zum Krafttraining' },
  { letter: 'S', name: 'Schwimmbrett', cat: 'sw', def: 'Ein Hilfsmittel aus Schaumstoff, das die Beine beim Schwimmen anhebt und so das isolierte Training der Arme ermöglicht. Im Techniktraining hilft es, Armzug und Atemrhythmus unabhängig vom Beinschlag zu üben.', link: 'kraulschwimmen.html', linkText: 'Zum Kraulschwimmen' },
  { letter: 'S', name: 'Stabilität', cat: 'both', def: 'Die Fähigkeit, eine Körperposition oder Gelenkstellung unter Belastung zu halten. Stabilität ist die Grundlage jeder Kraftübung und verhindert, dass unerwünschte Ausweichbewegungen entstehen.', link: null },
  // T
  { letter: 'T', name: 'Technik', cat: 'both', def: 'Die korrekte Ausführungsform einer Übung oder Bewegung. Saubere Technik ist die Voraussetzung für effektives Training und schützt gleichzeitig vor Überlastung und Verletzungen.', link: null },
  { letter: 'T', name: 'Trainingsplan', cat: 'both', def: 'Eine strukturierte Übersicht über Übungen, Sätze, Wiederholungen und Trainingstage. Ein guter Trainingsplan passt zum individuellen Ziel, Fitnesslevel und Alltag — und wird regelmäßig angepasst.', link: null },
  // Ü
  { letter: 'Ü', name: 'Überlastungsprinzip', cat: 'kf', def: 'Ein Grundprinzip des Krafttrainings: der Körper passt sich nur an, wenn er mit einem Reiz konfrontiert wird, der über dem gewohnten Niveau liegt. Zu wenig Reiz = kein Fortschritt. Zu viel = Übertraining.', link: 'training.html', linkText: 'Zum Krafttraining' },
  // V
  { letter: 'V', name: 'Volumen', cat: 'kf', def: 'Die Gesamtmenge der geleisteten Arbeit — in der Regel berechnet als Sätze × Wiederholungen × Gewicht. Volumen ist einer der wichtigsten Faktoren für Muskelwachstum, muss aber mit ausreichend Regeneration balanciert werden.', link: 'training.html', linkText: 'Zum Krafttraining' },
  // W
  { letter: 'W', name: 'Warm-up', cat: 'both', def: 'Die Aufwärmphase vor dem Training. Sie erhöht die Körpertemperatur, aktiviert die beteiligten Muskelgruppen und bereitet das Nervensystem auf die bevorstehende Belastung vor — und senkt damit das Verletzungsrisiko.', link: null },
  { letter: 'W', name: 'Wassergewöhnung', cat: 'sw', def: 'Die erste Phase im Schwimmtraining für Einsteigerinnen: Vertrauen ins Wasser aufbauen, das Auftriebsgefühl kennenlernen und erste Atemübungen. Eine gute Wassergewöhnung legt das Fundament für alle weiteren Techniklernschritte.', link: 'kraulschwimmen.html', linkText: 'Zum Kraulschwimmen' },
  { letter: 'W', name: 'Wechseljahre & Sport', cat: 'kf', def: 'In den Wechseljahren verändert sich der Hormonhaushalt deutlich — Östrogen und Progesteron sinken, was Muskelabbau, Gewichtszunahme und Knochenschwund begünstigt. Regelmäßiges Kraft- und Ausdauertraining gilt als wirksamstes Mittel gegen diese Veränderungen.', link: 'training.html', linkText: 'Zum Krafttraining' },
  // X
  { letter: 'X', name: 'X-Faktor', cat: 'both', def: 'Der individuelle Unterschied im Ansprechen auf Training — genetisch beeinflusst, aber nicht entscheidend. Jeder Körper reagiert anders auf Reize, weshalb ein guter Trainingsplan immer individuell angepasst wird.', link: null },
  // Y
  { letter: 'Y', name: 'Yoga & Training', cat: 'both', def: 'Yoga ergänzt Kraft- und Schwimmtraining sinnvoll: Es verbessert Beweglichkeit, Atemkontrolle und Körperwahrnehmung. Besonders atemfokussierte Praktiken wie Pranayama können die Regeneration unterstützen.', link: null },
  // Z
  { letter: 'Z', name: 'Zieldefinition', cat: 'both', def: 'Ein klar formuliertes Trainingsziel ist die Grundlage jedes guten Plans. Konkrete Ziele — z. B. „in 12 Wochen 5 kg mehr beim Rudern" oder „erste 50-Meter-Kraulstrecke" — machen Fortschritt sichtbar und halten die Motivation hoch.', link: null },
  { letter: 'Z', name: 'Zugübungen', cat: 'kf', def: 'Übungen, bei denen ein Gewicht in Richtung Körper gezogen wird — z. B. Rudern, Latziehen oder Bizepscurls. Zugübungen stärken den Rücken und die Rückseite der Schulter und sind ein wichtiges Gegengewicht zu drückenden Übungen.', link: 'training.html', linkText: 'Zum Krafttraining' },
];

// ── Render terms ──────────────────────────────────────────────────────────
function renderTerms(filter) {
  const container = document.getElementById('terms-container');
  container.innerHTML = '';
  const visible = filter === 'all' ? terms : terms.filter(t => t.cat === filter);
  const grouped = {};
  visible.forEach(t => {
    if (!grouped[t.letter]) grouped[t.letter] = [];
    grouped[t.letter].push(t);
  });
  const empty = document.getElementById('emptyState');
  if (Object.keys(grouped).length === 0) {
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  Object.keys(grouped).sort().forEach(letter => {
    const sec = document.createElement('div');
    sec.className = 'letter-section';
    sec.id = 'letter-' + letter;
    sec.innerHTML = '<div class="letter-heading">' + letter + '</div><div class="term-grid"></div>';
    const grid = sec.querySelector('.term-grid');
    grouped[letter].forEach(t => {
      const badgeLabels = { kf: 'Krafttraining', sw: 'Kraulschwimmen', both: 'Allgemein' };
      const card = document.createElement('div');
      card.className = 'term-card';
      card.innerHTML =
        '<div class="term-name">' + t.name + '</div>' +
        '<p class="term-def">' + t.def + '</p>' +
        '<span class="term-badge ' + t.cat + '">' + badgeLabels[t.cat] + '</span>';
      grid.appendChild(card);
    });
    container.appendChild(sec);
  });
}

// ── Filter ────────────────────────────────────────────────────────────────
function filterTerms(filter, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTerms(filter);
}

// ── Mobile nav ────────────────────────────────────────────────────────────
function checkWidth() {
  var nav = document.getElementById('navLinks');
  var burger = document.getElementById('burger');
  if (!nav || !burger) return;
  if (window.innerWidth <= 768) { nav.style.display = 'none'; burger.style.display = 'flex'; }
  else { nav.style.display = 'flex'; burger.style.display = 'none'; }
}
function toggleMobileNav() {
  var nav = document.getElementById('mobileNav');
  if (nav) nav.style.display = nav.style.display === 'flex' ? 'none' : 'flex';
}
